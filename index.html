<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>nargan's projects</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <link rel="icon" type="image/x-icon" href="https://sun9-62.userapi.com/s/v1/ig2/TxIWkFv2SSn7KM4g0q4bd_7WBUUtjP1EHEY9Oviab7JnTXhZ2EsH75FdIjfZXzrvWXlUNndi28sep9lCQLs0dzyD.jpg?quality=95&as=32x32,48x48,72x72,108x108,160x160,240x240,360x360,480x480,540x540,600x600&from=bu&cs=600x0">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --text-light: #f6f3e8;
            --text-secondary: #e2ddce;
            --accent-moss: #9ab87a;
            --accent-earth: #dbc49a; /* Улучшенный контраст */
            --border-glow: rgba(220, 200, 150, 0.3);
            --card-bg: rgba(35, 40, 28, 0.5);
            --shadow-soft: 0 12px 28px -8px rgba(0, 0, 0, 0.3);
            --transition: 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            font-family: 'EB Garamond', serif;
            font-weight: 400;
            background-color: #1a1f14;
            color: var(--text-secondary);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 2rem 1.5rem;
        }

        ::selection {
            background-color: rgba(154, 184, 122, 0.4);
            color: #fff;
        }

        ::-moz-selection {
            background-color: rgba(154, 184, 122, 0.4);
            color: #fff;
        }

        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -3;
            filter: brightness(0.7) contrast(1.1) saturate(1.1);
        }

        .overlay-soft {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, rgba(30, 35, 22, 0.6), rgba(15, 18, 10, 0.85));
            z-index: -2;
            pointer-events: none;
        }

        .warm-ambient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(203, 171, 122, 0.2), rgba(0, 0, 0, 0.4));
            mix-blend-mode: soft-light;
            z-index: -1;
            pointer-events: none;
        }

        .grain-subtle {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='1' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.25'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 220px;
            opacity: 0.35;
            mix-blend-mode: overlay;
            pointer-events: none;
            z-index: 0;
            animation: softDrift 20s infinite alternate;
        }

        @keyframes softDrift {
            0% { background-position: 0 0; opacity: 0.3; }
            100% { background-position: 5% 8%; opacity: 0.45; }
        }

        ::-webkit-scrollbar { width: 5px; background: transparent; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(200, 190, 160, 0.25); border-radius: 10px; transition: background 0.2s; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(200, 190, 160, 0.45); }
        * { scrollbar-width: thin; scrollbar-color: rgba(200, 190, 160, 0.25) transparent; }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .header-section {
            margin-bottom: 4rem;
            text-align: left;
            border-left: 4px solid var(--accent-moss);
            padding-left: 1.5rem;
        }

        .welcome-text {
            font-size: 2.8rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #f3efdf, #dcccaa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .contacts {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .contact-link {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1.1rem;
            padding: 0.2rem 0;
            border-bottom: 1px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }

        .contact-link:hover {
            color: var(--text-light);
            border-bottom-color: var(--accent-moss);
        }

        .contact-link i {
            font-size: 1.3rem;
            transition: color 0.2s;
        }

        .contact-link.github:hover i,
        .contact-link.telegram:hover i {
            color: var(--accent-moss);
        }

        .projects-grid {
            margin-top: 1rem;
            animation: fadeIn 0.8s ease-out;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
        }

        .project-card {
            background: var(--card-bg);
            backdrop-filter: blur(2px);
            border-radius: 48px 24px 48px 24px;
            padding: 1.8rem;
            border: 1px solid var(--border-glow);
            transition: transform var(--transition), background 0.3s, box-shadow 0.3s;
            box-shadow: var(--shadow-soft);
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .project-card:hover {
            transform: translateY(-6px);
            background: rgba(50, 55, 40, 0.6);
            border-color: rgba(154, 184, 122, 0.6);
        }

        .project-icon {
            margin-bottom: 1.5rem;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(255, 255, 255, 0.02);
            transition: background-color 0.2s;
            border-radius: 25%;
        }

        .project-card:hover .project-icon {
            background-color: rgba(154, 184, 122, 0.2);
        }

        .custom-icon {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 500;
            margin-bottom: 0.7rem;
            color: var(--text-light);
        }

        .card-text {
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .card-footer-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
        }

        .badge-category {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-earth);
            transition: color 0.2s;
        }

        .project-card:hover .badge-category {
            color: var(--accent-moss);
        }

        .corner-decoration {
            font-size: 1.2rem;
            color: var(--text-secondary);
            opacity: 0.4;
            transition: opacity 0.2s, color 0.2s;
        }

        .project-card:hover .corner-decoration {
            opacity: 1;
            color: var(--accent-moss);
        }

        /* Кликабельная область всей карточки */
        .project-link-stretched {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            text-decoration: none;
            color: inherit;
            border-radius: 48px 24px 48px 24px;
        }

        /* Стили для фокуса с клавиатуры */
        .project-link-stretched:focus-visible {
            outline: 2px solid var(--accent-moss);
            outline-offset: 4px;
        }

        /* Контейнер для группировки иконок в углу */
        .footer-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            pointer-events: none; /* Пропускает клики на stretched-link */
        }

        /* Иконка "Learn more" на карточке */
        .learn-more-icon-btn {
            pointer-events: auto; /* Восстанавливает кликабельность для самой иконки */
            font-size: 1.25rem;
            color: var(--text-secondary);
            opacity: 0.4;
            transition: opacity 0.2s, color 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            position: relative;
            z-index: 2; /* Расположена поверх stretched-link */
        }

        .project-card:hover .learn-more-icon-btn {
            opacity: 0.7;
        }

        .learn-more-icon-btn:hover {
            opacity: 1 !important;
            color: var(--accent-moss);
            transform: scale(1.15);
        }

        /* OFFLINE PROJECT DIMMING STYLES */
        .col.offline {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(100%);
            transition: all 0.3s ease;
        }

        .col.offline .project-card {
            background: rgba(15, 15, 15, 0.4);
            border-color: rgba(100, 100, 100, 0.2);
            box-shadow: none;
        }

        .col.offline .badge-category {
            color: #d9534f !important;
        }

        .col.offline .badge-category::after {
            content: " (OFFLINE)";
            font-weight: 600;
        }

        .col.offline .corner-decoration {
            opacity: 1;
            color: #d9534f;
        }

        .col.offline .corner-decoration i::before {
            content: "\F62A"; /* bi-x-circle replaces bi-arrow-up-right */
        }

        .visitor-counter {
            position: fixed;
            bottom: 24px;
            right: 24px;
            font-family: 'EB Garamond', serif;
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-secondary);
            background-color: rgba(20, 25, 18, 0.5);
            backdrop-filter: blur(2px);
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid rgba(220, 200, 150, 0.2);
            z-index: 1000;
            transition: border-color 0.2s, color 0.2s;
        }

        .visitor-counter:hover {
            border-color: var(--accent-moss);
            color: var(--text-light);
        }

        @media (max-width: 768px) {
            body { padding: 1.2rem; }
            .welcome-text { font-size: 2rem; }
            .header-section { padding-left: 1rem; }
            .row { gap: 1.2rem; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Поддержка людей с вестибулярными нарушениями */
        @media (prefers-reduced-motion: reduce) {
            .bg-video { display: none; }
            .grain-subtle { 
                animation: none; 
                opacity: 0.2; 
            }
            .project-card, 
            .contact-link, 
            .corner-decoration, 
            .badge-category, 
            .project-icon,
            .visitor-counter,
            .learn-more-icon-btn {
                transition: none;
            }
            .projects-grid {
                animation: none;
            }
        }
    </style>
</head>
<body>

<video class="bg-video" autoplay loop muted playsinline>
    <source src="" type="video/mp4">
</video>
<div class="overlay-soft"></div>
<div class="warm-ambient"></div>
<div class="grain-subtle"></div>

<main class="container">
    <div class="header-section">
        <h1 class="welcome-text" data-i18n="welcome">Welcome to the Nargan's website, here you will find some of my pet-projects.</h1>
        <div class="contacts">
            <a href="https://github.com/Nergan" target="_blank" class="contact-link github">
                <i class="bi bi-github"></i>
                github.com/Nergan
            </a>
            <a href="https://t.me/kiry_vampy" target="_blank" class="contact-link telegram">
                <i class="bi bi-telegram"></i>
                @kiry_vampy
            </a>
        </div>
    </div>

    <div class="projects-grid">
        <div class="row" id="projects-container">
            <!-- Projects are dynamically rendered here via JavaScript -->
        </div>
    </div>
</main>

<div class="visitor-counter" id="visitor-counter">visitors --</div>

<script>
    console.log('Greetings from GitHub!')

    const projectsConfig = [
        { i18n: 1, plugin: "evenfest", link: "/evenfest", icon: "https://cdn.jsdelivr.net/gh/Nergan/media@main/evenfest/favicon.png" },
        { i18n: 2, plugin: "snake", link: "/snake", icon: "https://psv4.userapi.com/s/v1/d2/AArGNCyJ26rCvrn3VEmn6UZBf2w6S44kTJ8WMu1mTdRB66TIwCw5c6N2Arb6cX6v25ZxfO62p3AMxzPOY2ddNsq1sUHxLNiDanZJg4fBBE1G0R7NhZcwQOG41K1EHW3HvhpYBIwMDtlQ/snack.png" },
        { i18n: 3, plugin: "toadcode", link: "/toadcode", icon: "https://cdn.jsdelivr.net/gh/Nergan/media@main/toadcode/favicon.png" },
        { i18n: 5, plugin: "formular", link: "/formular", icon: "https://cdn.jsdelivr.net/gh/Nergan/media@main/formular/favicon.png" },
        { i18n: 6, plugin: "yellow_mirror", link: "/yellow-mirror", icon: "https://cdn.jsdelivr.net/gh/Nergan/media@main/yellow-mirror/favicon.png" },
        { i18n: 8, plugin: "dnd", link: "/dnd", icon: "https://cdn.jsdelivr.net/gh/Nergan/media@main/dnd/menu favicon.png" },
        { i18n: 9, plugin: "markbin", link: "/markbin", icon: "https://cdn.jsdelivr.net/gh/Nergan/media@main/markbin/favicon.png" },
        { i18n: 10, plugin: "kanban", link: "/kanban", icon: "https://psv4.userapi.com/s/v1/d2/cXhcvJAqHzGb946EebUXj0s6N-Tn0OyQRUjT027EuhZiYlNdmPjEnnlORJtDBb7fIDdrucwOMkStCRd_aoGv6hb7b1UeHbuRhEKShCVhpQGKP8PFkEMKhy3hAO2dFFzyn9tWrHv1edw_/kanban.png" },
        { i18n: 11, plugin: "netlazy", link: "/netlazy", icon: "https://cdn.jsdelivr.net/gh/Nergan/media@main/netlazy/favicon.png" }
    ];

    const translations = {
        en: {
            welcome: "Welcome to the Nargan's website, here you will find some of my pet-projects.",
            project1_title: "evenfest",
            project1_desc: "cosplay community website",
            project1_category: "art",
            project2_title: "snake",
            project2_desc: "just snake",
            project2_category: "game",
            project3_title: '<span style="color: lime">toad</span>code',
            project3_desc: 'open workspace',
            project3_category: "dev",
            project5_title: "formular",
            project5_desc: "any to any",
            project5_category: "doc",
            project6_title: "yellow mirror",
            project6_desc: "simple web browser",
            project6_category: "web",
            project8_title: "d&d tools",
            project8_desc: "tools for d&d",
            project8_category: "game",
            project9_title: '<span style="color: #e06c75">mark</span>bin',
            project9_desc: "markdown editor&viewer&sharer",
            project9_category: "doc",
            project10_title: 'kanban',
            project10_desc: "lite kanban board",
            project10_category: "management",
            project11_title: "netlazy",
            project11_desc: "just dating",
            project11_category: "social",
            learn_more: "Learn more"
        },
        ru: {
            welcome: "Добро пожаловать на мой сайт-визитку, здесь вы найдете некоторые из моих пет-проектов.",
            project1_title: "evenfest",
            project1_desc: "сайт сообщества косплееров",
            project1_category: "творчество",
            project2_title: "змейка",
            project2_desc: "просто змейка",
            project2_category: "игры",
            project3_title: '<span style="color: lime">toad</span>code',
            project3_desc: 'pastebin на максималках',
            project3_category: "разработка",
            project5_title: "formular",
            project5_desc: "конвертер файлов",
            project5_category: "прикладные задачи",
            project6_title: "yellow mirror",
            project6_desc: "веб зеркало",
            project6_category: "веб",
            project8_title: "d&d tools",
            project8_desc: "инструменты для d&d",
            project8_category: "игры",
            project9_title: '<span style="color: #e06c75">mark</span>bin',
            project9_desc: "редактор+ markdown",
            project9_category: "документы",
            project10_title: 'kanban',
            project10_desc: "доска kanban",
            project10_category: "управление",
            project11_title: "netlazy",
            project11_desc: "просто дэйтинг",
            project11_category: "общение",
            learn_more: "Подробнее"
        }
    };

    function renderProjects() {
        const container = document.getElementById('projects-container');
        container.innerHTML = projectsConfig.map(p => {
            const hasLearnMore = (p.plugin === "netlazy");
            return `
            <div class="col" ${p.id ? `data-project="${p.id}"` : ''} ${p.plugin ? `data-plugin="${p.plugin}"` : ''}>
                <div class="project-card">
                    <a href="${p.link}" class="project-link-stretched"></a>
                    <div class="project-icon icon-${p.i18n}">
                        <img src="${p.icon}" alt="icon" class="custom-icon">
                    </div>
                    <h5 class="card-title" data-i18n="project${p.i18n}_title"></h5>
                    <p class="card-text" data-i18n="project${p.i18n}_desc"></p>
                    <div class="card-footer-links">
                        <span class="badge-category" data-i18n="project${p.i18n}_category"></span>
                        <div class="footer-actions">
                            <div class="corner-decoration">
                                <i class="bi bi-arrow-up-right"></i>
                            </div>
                            ${hasLearnMore ? `
                            <a href="/netlazy/welcome" class="learn-more-icon-btn" data-i18n-title="learn_more" title="Learn more">
                                <i class="bi bi-info-circle"></i>
                            </a>
                            ` : ''}
                        </div>
                    </div>
                </div>
            </div>
            `;
        }).join('');
    }

    async function fetchSystemStatus() {
        try {
            const response = await fetch('/api/status');
            if (response.ok) {
                const data = await response.json();
                const plugins = data.plugins || {};
                
                document.querySelectorAll('.col[data-plugin]').forEach(col => {
                    const pluginName = col.getAttribute('data-plugin');
                    if (plugins[pluginName] && plugins[pluginName].status !== 'online') {
                        col.classList.add('offline');
                    }
                });
            }
        } catch (error) {
            console.warn('Could not fetch system status for UI dimming', error);
        }
    }

    function setLanguage(lang) {
        if (!translations[lang]) lang = 'en';
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[lang][key]) el.innerHTML = translations[lang][key];
            else if (translations['en'][key]) el.innerHTML = translations['en'][key];
        });

        // Localize tooltips
        document.querySelectorAll('[data-i18n-title]').forEach(el => {
            const key = el.getAttribute('data-i18n-title');
            if (translations[lang][key]) el.setAttribute('title', translations[lang][key]);
            else if (translations['en'][key]) el.setAttribute('title', translations['en'][key]);
        });
    }

    function detectLanguage() {
        const lang = navigator.language || navigator.userLanguage;
        return lang && lang.toLowerCase().startsWith('ru') ? 'ru' : 'en';
    }

    function getVisitorId() {
        let visitorId = localStorage.getItem('visitorId');
        if (!visitorId) {
            visitorId = crypto.randomUUID ? crypto.randomUUID() : 'uuid-' + Date.now() + '-' + Math.random().toString(36).substring(2);
            localStorage.setItem('visitorId', visitorId);
        }
        return visitorId;
    }

    async function trackVisitor() {
        const visitorId = getVisitorId();
        const counterEl = document.getElementById('visitor-counter');
        
        if (sessionStorage.getItem('tracked_this_session')) {
            const savedCount = sessionStorage.getItem('last_known_count');
            if (savedCount) {
                counterEl.textContent = `visitors ${savedCount}`;
                return;
            }
        }

        try {
            const response = await fetch('/api/track', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ uuid: visitorId })
            });
            if (response.ok) {
                const data = await response.json();
                counterEl.textContent = `visitors ${data.count}`;
                
                sessionStorage.setItem('tracked_this_session', 'true');
                sessionStorage.setItem('last_known_count', data.count);
            } else {
                counterEl.textContent = 'visitors ?';
            }
        } catch (error) {
            console.error('Failed to track visitor:', error);
            counterEl.textContent = 'visitors ?';
        }
    }

    async function loadRandomBackground() {
        const videoElement = document.querySelector('.bg-video');
        if (!videoElement) return;

        try {
            const response = await fetch('./api/mainpage-backgrounds');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            const backgrounds = data.backgrounds;
            if (!backgrounds || backgrounds.length === 0) throw new Error('No backgrounds');

            const randomIndex = Math.floor(Math.random() * backgrounds.length);
            const selected = backgrounds[randomIndex];
            const source = document.createElement('source');
            source.src = `https://cdn.jsdelivr.net/gh/Nergan/media@main/mainpage-backgrounds/${selected}`;
            source.type = 'video/mp4';
            videoElement.innerHTML = '';
            videoElement.appendChild(source);
            videoElement.load();

            videoElement.onerror = () => {
                console.warn(`Failed to load ${selected}, trying fallback`);
                const fallbackIndex = (randomIndex + 1) % backgrounds.length;
                const fallbackSrc = `https://cdn.jsdelivr.net/gh/Nergan/media@main/mainpage-backgrounds/${backgrounds[fallbackIndex]}`;
                videoElement.innerHTML = '';
                const fallbackSource = document.createElement('source');
                fallbackSource.src = fallbackSrc;
                fallbackSource.type = 'video/mp4';
                videoElement.appendChild(fallbackSource);
                videoElement.load();
            };
        } catch (err) {
            console.error('Background error:', err);
            videoElement.innerHTML = '';
            const fallbackSource = document.createElement('source');
            fallbackSource.src = 'https://cdn.jsdelivr.net/gh/Nergan/media@main/mainpage-backgrounds/autumn.mp4';
            fallbackSource.type = 'video/mp4';
            videoElement.appendChild(fallbackSource);
            videoElement.load();
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderProjects();
        const lang = detectLanguage();
        setLanguage(lang);
        fetchSystemStatus();
        trackVisitor();
        loadRandomBackground();
    });
</script>
</body>
</html>
