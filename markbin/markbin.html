<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>markbin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor@3.9.6/dist/index.css" />
    <script src="https://cdn.jsdelivr.net/npm/vditor@3.9.6/dist/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="icon" type="image/x-icon" href="{{ base_url }}/static/favicon.png">
    <link rel="stylesheet" href="{{ base_url }}/static/style.css">
</head>
<body>
    <div id="toast" class="toast"></div>

    <div class="layout">
        <main class="editor-container" id="editor-container">
            <input type="file" id="file-input" accept=".md,.txt" style="display: none;" />
            
            <div id="editor-wrapper">
                <div id="editor"></div>
            </div>
            <div id="viewer" class="markdown-body hidden"></div>
            
            <div id="loading" class="hidden">Loading document...</div>
            <div id="error-msg" class="hidden">Document not found.</div>
        </main>
        
        <aside id="toc-sidebar" class="sidebar hidden">
            <h3>Structure</h3>
            <div id="toc-content"></div>
        </aside>
    </div>

    <!-- Absolutely positioned bottom bar -->
    <div class="bottom-container" id="bottom-container">
        <button id="toggle-bar-btn" class="toggle-bar-btn" title="Toggle Panel">
            <i class="bi bi-chevron-down"></i>
        </button>
        <nav class="bottom-bar">
            <a href="{{ base_url }}/" class="logo">mark<span style="color: white">bin</span>.</a>
            <div class="actions">
                <button id="btn-toc" class="icon-btn" title="Toggle Structure" aria-label="Toggle Table of Contents">
                    <i class="bi bi-list-nested"></i>
                </button>
                <button id="btn-action" class="icon-btn disabled" aria-label="Action">
                    <!-- Icon dynamically injected -->
                </button>
            </div>
        </nav>
    </div>

    <script>
        window.MARKBIN_CONFIG = {
            baseUrl: "{{ base_url }}",
            uuid: "{{ uuid }}"
        };
    </script>
    <script src="{{ base_url }}/scripts/app.js"></script>
</body>
</html>
