<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>markbin</title>
    
    <!-- Google Fonts: Comfortaa -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
    
    <!-- Unified render engine: Vditor handles both Editing and Viewing -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor@3.9.6/dist/index.css" />
    <script src="https://cdn.jsdelivr.net/npm/vditor@3.9.6/dist/index.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="icon" type="image/x-icon" href="https://cdn.jsdelivr.net/gh/Nergan/media@main/markbin/favicon.png">
    
    <!-- Cache-buster appended to force mobile browsers to fetch the updated CSS -->
    <link rel="stylesheet" href="{{ base_url }}/static/style.css?v=1.2">
</head>
<body>
    <div id="toast" class="toast"></div>

    <!-- Custom Confirm Modal -->
    <div id="custom-confirm-modal" class="modal hidden">
        <div class="modal-content">
            <p>Replace existing document with this file?</p>
            <p class="modal-subtext">Click <strong>'Cancel'</strong> to append it at your cursor instead.</p>
            <div class="modal-actions">
                <button id="modal-btn-cancel" class="modal-btn">Cancel</button>
                <button id="modal-btn-replace" class="modal-btn primary">Replace</button>
            </div>
        </div>
    </div>

    <div class="layout">
        <main class="editor-container" id="editor-container">
            <input type="file" id="file-input" accept=".md,.txt" class="visually-hidden" />
            
            <div id="editor-wrapper">
                <div id="editor"></div>
            </div>
            <div id="viewer" class="markdown-body hidden"></div>
            
            <div id="loading" class="hidden">Loading document...</div>
            <div id="error-msg" class="hidden">Document not found.</div>
        </main>
        
        <aside id="toc-sidebar" class="sidebar hidden">
            <h3>Structure</h3>
            <div id="toc-content"></div>
        </aside>
    </div>

    <!-- Adaptive Navigation Bar -->
    <div class="bottom-container" id="bottom-container">
        <button id="toggle-bar-btn" class="toggle-bar-btn" title="Toggle Panel">
            <i class="bi bi-chevron-down"></i>
        </button>
        <nav class="bottom-bar">
            <a href="{{ base_url }}/" class="logo">mark<span style="color: white">bin</span>.</a>
            <div class="actions">
                <!-- Live Countdown Timer -->
                <div id="doc-timer" class="doc-timer hidden"></div>
                <!-- Time-to-live input for Publish (HH:MM:SS) -->
                <input type="text" id="ttl-input" class="ttl-input" placeholder="HH:MM:SS" title="Optional document lifetime" />

                <button id="btn-toc" class="icon-btn" title="Toggle Structure" aria-label="Toggle Table of Contents">
                    <i class="bi bi-list-nested"></i>
                </button>
                
                <label id="btn-upload" class="icon-btn" title="Load Markdown file" for="file-input" style="display: inline-flex; align-items: center; justify-content: center; margin: 0;">
                    <i class="bi bi-file-earmark-arrow-up"></i>
                </label>
                
                <button id="btn-download" class="icon-btn" title="Download Markdown (Ctrl+S)" aria-label="Download Document">
                    <i class="bi bi-download"></i>
                </button>

                <button id="btn-action" class="icon-btn disabled" aria-label="Action">
                    <!-- Icon dynamically injected -->
                </button>
            </div>
        </nav>
    </div>

    <script>
        window.MARKBIN_CONFIG = {
            baseUrl: {{ base_url | tojson | safe }},
            uuid: {{ uuid | tojson | safe }}
        };
    </script>
    
    <script src="{{ base_url }}/scripts/app.js?v=1.2"></script>
</body>
</html>
