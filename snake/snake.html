<!-- snake.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SNAKE · wilderness whispers</title>
    <!-- Bootstrap 5 CSS (for icons only, styles overridden) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <!-- Google Fonts: EB Garamond -->
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <!-- Our custom CSS -->
    <link rel="stylesheet" href="/snake/static/style.css">
    <!-- Icon (soft leaf) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2214%22>🍃</text></svg>">
</head>
<body>

<!-- Video Background -->
<video class="bg-video" autoplay loop muted playsinline id="bgVideo">
    <source src="" type="video/mp4">
    Your browser does not support HTML5 video.
</video>
<div class="overlay-soft"></div>
<div class="warm-ambient"></div>
<div class="grain-subtle"></div>

<div class="container-fluid p-0 game-wrapper">
    <!-- Game Interface -->
    <div class="game-ui">
        <div class="stats-bar">
            <div class="stat">
                <span class="stat-label">SCORE</span>
                <span id="score" class="stat-value">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">LEVEL</span>
                <span id="level" class="stat-value">1</span>
            </div>
            <div class="stat">
                <span class="stat-label">LENGTH</span>
                <span id="length" class="stat-value">3</span>
            </div>
        </div>
        
        <div class="controls">
            <button id="startBtn" class="btn-control" title="Start (Space)">
                <i class="bi bi-play-fill"></i>
            </button>
            <button id="pauseBtn" class="btn-control" title="Pause (P)">
                <i class="bi bi-pause-fill"></i>
            </button>
            <button id="restartBtn" class="btn-control" title="Restart (R)">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
            <button id="fullscreenBtn" class="btn-control" title="Fullscreen (F)">
                <i class="bi bi-arrows-fullscreen"></i>
            </button>
        </div>
    </div>
    
    <!-- Game Canvas Container -->
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Start Screen -->
        <div id="startScreen" class="overlay-screen">
            <div class="overlay-content">
                <h1 class="organic-title">SNAKE</h1>
                <div class="instructions">
                    <p>USE <span class="soft-key">W A S D</span> TO MOVE</p>
                    <p>PRESS <span class="soft-key">SPACE</span> TO START</p>
                    <p>TELEPORT THROUGH WALLS</p>
                </div>
                <button id="startGameBtn" class="btn-organic-large">
                    <i class="bi bi-play-circle"></i> START GAME
                </button>
            </div>
        </div>
        
        <!-- Pause Screen -->
        <div id="pauseScreen" class="overlay-screen" style="display: none;">
            <div class="overlay-content">
                <h2 class="organic-title">PAUSED</h2>
                <p class="game-info-text">PRESS <span class="soft-key">P</span> TO CONTINUE</p>
                <button id="resumeBtn" class="btn-organic-large">
                    <i class="bi bi-play-circle"></i> RESUME
                </button>
            </div>
        </div>
        
        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="overlay-screen" style="display: none;">
            <div class="overlay-content">
                <h2 class="organic-title gameover">GAME OVER</h2>
                <div class="final-stats">
                    <div class="final-stat">
                        <span>SCORE</span>
                        <span id="finalScore">0</span>
                    </div>
                    <div class="final-stat">
                        <span>LEVEL</span>
                        <span id="finalLevel">1</span>
                    </div>
                    <div class="final-stat">
                        <span>LENGTH</span>
                        <span id="finalLength">3</span>
                    </div>
                </div>
                <button id="playAgainBtn" class="btn-organic-large">
                    <i class="bi bi-arrow-clockwise"></i> PLAY AGAIN
                </button>
            </div>
        </div>
        
        <!-- Direction Indicator -->
        <div id="directionIndicator" class="direction-indicator">
            <div class="arrow up"><i class="bi bi-caret-up-fill"></i></div>
            <div class="arrow left"><i class="bi bi-caret-left-fill"></i></div>
            <div class="arrow down"><i class="bi bi-caret-down-fill"></i></div>
            <div class="arrow right"><i class="bi bi-caret-right-fill"></i></div>
        </div>
    </div>
    
    <!-- Particles Canvas -->
    <canvas id="particlesCanvas"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="/snake/scripts/script.js"></script>
</body>
</html>
