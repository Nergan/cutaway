<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yellow mirror</title>
    <!-- Favicon из локального файла -->
    <link rel="icon" href="/yellow mirror/static/favicon.png" type="image/svg+xml">
    <!-- External CSS -->
    <link rel="stylesheet" href="/yellow mirror/static/style.css">
</head>
<body>
    <!-- IFrame для отображения сайта -->
    <iframe id="site-frame" sandbox="allow-scripts allow-same-origin allow-forms" title="Просмотр сайта"></iframe>

    <!-- Анимированный фон-заглушка (мелькающие жёлтые сигналы) -->
    <div id="splash" class="splash-screen">
        <div class="splash-layer"></div>
    </div>

    <!-- Контейнер с панелью и полоской -->
    <div class="panel-container">
        <div class="expanded-panel" id="expandedPanel">
            <input type="text" id="url-input" placeholder="paste web link" class="invalid" />
            <button id="load-site-btn" aria-label="Загрузить сайт" disabled>
                <!-- Иконка глобуса из того же файла, что и favicon -->
                <img src="/yellow mirror/static/favicon.png" alt="Globe" width="24" height="24">
            </button>
        </div>
        <div class="minimized-bar" id="minimizedBar"></div>
    </div>

    <!-- External JavaScript -->
    <script src="/yellow mirror/scripts/script.js"></script>
</body>
</html>
