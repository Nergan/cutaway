<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yellow mirror</title>
    <link rel="icon" href="/static/favicon.png" type="image/svg+xml">
    <link rel="stylesheet" href="/static/styles/base.css">
    <link rel="stylesheet" href="/static/styles/panel.css">
    <link rel="stylesheet" href="/static/styles/responsive.css">
    <style>
        #stream-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: black;
            display: none;
        }
        #stream-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }
        #click-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: transparent;
            display: none;
        }
    </style>
</head>
<body>
    <video id="background-video" autoplay loop muted playsinline>
        <source src="/static/moon.mp4" type="video/mp4">
    </video>

    <div id="stream-container">
        <img id="stream-image" src="" alt="Browser stream">
        <div id="click-overlay"></div>
    </div>

    <div class="panel-container">
        <div class="expanded-panel" id="expandedPanel">
            <input type="text" id="url-input" placeholder="paste web link" />
            <button id="load-site-btn" aria-label="Загрузить сайт">
                <img src="/static/favicon.png" alt="Globe" width="24" height="24">
            </button>
        </div>
        <div class="minimized-bar" id="minimizedBar"></div>
    </div>

    <script src="/scripts/core.js"></script>
    <script src="/scripts/browser.js"></script>
    <script src="/scripts/dom.js"></script>
    <script src="/scripts/background.js"></script>
    <script src="/scripts/panel.js"></script>
    <script src="/scripts/stream.js"></script>
    <script src="/scripts/init.js"></script>
</body>
</html>
