<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yellow mirror</title>
    <link rel="icon" href="https://cdn.jsdelivr.net/gh/Nergan/media@main/yellow-mirror/favicon.png" type="image/svg+xml">
    <link rel="stylesheet" href="/yellow_mirror/static/styles/style.css">
    <style>
        #site-stream {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: fill; z-index: 1; pointer-events: auto;
        }
    </style>
</head>
<body>
    <video id="background-video" autoplay loop muted playsinline>
        <source src="https://cdn.jsdelivr.net/gh/Nergan/media@main/yellow-mirror/moon.mp4" type="video/mp4">
    </video>

    <!-- Native CDP Stream renders here -->
    <img id="site-stream" style="display: none;" draggable="false" alt="">

    <div class="panel-container">
        <div class="expanded-panel" id="expandedPanel">
            <input type="text" id="url-input" placeholder="paste web link" />
            <button id="load-site-btn" aria-label="Загрузить сайт">
                <img src="https://cdn.jsdelivr.net/gh/Nergan/media@main/yellow-mirror/favicon.png" alt="Globe" width="24" height="24">
            </button>
        </div>
        <div class="minimized-bar" id="minimizedBar"></div>
    </div>

    <script src="/yellow_mirror/scripts/app.js"></script>
</body>
</html>
