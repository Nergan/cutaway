<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yellow Mirror</title>
    <link rel="icon" href="/yellow_mirror/static/favicon.png" type="image/png">
    <link rel="stylesheet" href="/yellow_mirror/static/styles/style.css">
</head>
<body>
    <video id="background-video" autoplay loop muted playsinline>
        <source src="/yellow_mirror/static/moon.mp4" type="video/mp4">
    </video>

    <!-- sandbox allows everything except top-level navigation, keeping SPAs contained -->
    <iframe id="site-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-downloads allow-presentation" title="View"></iframe>

    <div class="panel-container">
        <div class="expanded-panel" id="expandedPanel">
            <input type="text" id="url-input" placeholder="paste web link here..." />
            <button id="load-site-btn" aria-label="Load">GO</button>
        </div>
        <div class="minimized-bar" id="minimizedBar"></div>
    </div>

    <script src="/yellow_mirror/scripts/app.js"></script>
</body>
</html>
